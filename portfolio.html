<!DOCTYPE html>
<html lang="en-US">
<head>
  <!-- Define the character set used by the page. -->
  <meta charset="UTF-8">

  <!-- Makes the layout adapt correctly on phones, tablets, and desktops. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Text that appears in the browser tab. -->
  <title>Portfolio | Renato Saletti Santos</title>

  <!-- Connects this HTML page with the external CSS file. -->
  <link rel="stylesheet" href="style.css">
</head>
<body class="portfolio-page">
  <main class="page portfolio-layout">
    <nav class="top-menu" aria-label="Main navigation">
      <a class="menu-button" href="index.html">Home</a>
      <a class="menu-button" href="professional-experience.html">Professional Experience</a>
      <a class="menu-button" href="education.html">Education and Skills</a>
      <a class="menu-button active" href="portfolio.html">Portfolio</a>
      <a class="menu-button" href="contact.html">Contact</a>
    </nav>

    <div id="portfolio-root"></div>
  </main>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const projects = [
      {
        title: "Data Analytics Dashboard",
        category: "Business Intelligence",
        image: "img/Data Dashboards.jfif",
        summary: "Interactive dashboards focused on clean KPIs, practical insights, and decision-ready reporting.",
        tools: ["Power BI", "SQL", "Excel", "Data Cleaning"],
        liveDemo: "https://github.com/Resaletti/stock-market-analysis-dashboard",
        github: "https://github.com/Resaletti",
        accent: "mint"
      },
      {
        title: "Front-End Portfolio",
        category: "Web Development",
        image: "img/Front_end.jfif",
        summary: "Responsive pages built with HTML, CSS, JavaScript, and a strong focus on clear user experience.",
        tools: ["HTML", "CSS", "JavaScript", "React"],
        liveDemo: "https://interactive-portfolio-react.vercel.app",
        github: "https://github.com/Resaletti/Interactive-Portfolio-React",
        accent: "coral"
      },
      {
        title: "AI Learning Projects",
        category: "Artificial Intelligence",
        image: "img/IA.jfif",
        summary: "Applied studies connecting Python, data fundamentals, and machine learning concepts.",
        tools: ["Python", "AI Concepts", "Data Science", "Automation"],
        liveDemo: "#",
        github: "https://github.com/Resaletti",
        accent: "gold"
      }
    ];

    function ProjectCard({ project, index }) {
      return (
        <article
          className={`portfolio-card ${project.accent}`}
          style={{ "--card-delay": `${index * 120}ms` }}
        >
          <img src={project.image} alt={project.title} />
          <div className="portfolio-card-content">
            <span>{project.category}</span>
            <h2>{project.title}</h2>
            <p>{project.summary}</p>
            <div className="portfolio-tags">
              {project.tools.map((tool) => (
                <small key={tool}>{tool}</small>
              ))}
            </div>
            <div className="buttons">
              <a href={project.liveDemo} target="_blank" rel="noopener noreferrer">Live Demo ↗</a>
              <a href={project.github} target="_blank" rel="noopener noreferrer">GitHub</a>
            </div>
          </div>
        </article>
      );
    }

    function PortfolioApp() {
      return (
        <section className="portfolio-app" aria-label="Portfolio projects">
          <header className="portfolio-hero">
            <p>Selected Work</p>
            <h1>Selected Work

            Projects designed to simulate real-world applications, combining data analysis, modern interfaces, and problem-solving.</h1>
          </header>

          <section className="portfolio-grid">
            {projects.map((project, index) => (
              <ProjectCard key={project.title} project={project} index={index} />
            ))}
          </section>
        </section>
      );
    }

    ReactDOM.createRoot(document.getElementById("portfolio-root")).render(<PortfolioApp />);
  </script>
</body>
</html>
